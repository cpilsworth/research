name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble site artifact
        run: |
          mkdir -p .site
          cp -R docs/. .site/
          mkdir -p .site/dm-video-player
          cp dm-video-player/adobe-dm-video-player.js .site/dm-video-player/adobe-dm-video-player.js

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
